<!DOCTYPE html>
<html lang="en">

<head>
    <!-- CHARSET - Codifica dei caratteri (SEMPRE PRIMO)-->
    <meta charset="UTF-8">

    <!-- VIEWPORT - Per dispositivi mobili (SEMPRE SECONDO)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--TITLE - Titotlo della pagina (appare su Google e Tab browser)-->
    <title>Il sito di Pippo</title>

    <!-- DESCRIPTION - Descrizione per motori di ricerca (150-160 caratteri max)-->
    <meta 
        name="description"
        content="Impara HTML e CSS da zero con il mio corso completo"
    />

    <!-- FAVICON - Icona della pagina (appare nella barra del browser) -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- 16x16, 32x32 - Browser Classici -->
    <link rel="icon" sizes="16x16" href="favicon-16x16.png" />
    <link rel="icon" sizes="32x32" href="favicon-32x32.png" />
    <!-- 180x180 - Dispositivi Apple -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- KEYWODS - Parole chiave (poco usato oggi, ma utile sapere)-->
    <meta
        name="keywords"
        content="html, css,corso, web development, programmazione, frontend"
    />

    <!-- AUTHOR - Autore della pagina -->
    <meta name="author" content="Luigi Distefano" />

    <!-- ROBOTS - Istruzioni per i motori di ricerca -->
    <meta name="robots" content="index, follow" />
    <!-- Altre opzioni: "nonindex, nofollow | "index, nofollow" | "noindex, follow" -->

    <!-- OPEN GRAPH - Per condivisioni su Facebook/LinkedIN -->
    <meta
        property="og:title"
        content="Corso HTML CSS - Impara Il Web Development"
    />
    <meta
        property="og:description"
        content="Il corso più completo per imparare HTML e CSS"
    />
    <meta
        property="og:image"
        content="https://miosito.com/immagine-corso.jpg"
    />
    
    <meta property="og:url" content="httmp://miosito.com/corso-html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WebSchool" />

    <!-- TWITTER CARD - Per condivisioni su Twitter/X -->
    <meta name="twitter:card" content="summary">

    <meta name="twitter:site" content="@tuo_username">

    <meta name="twitter:title" content="Titolo Accattivante dell'Articolo">

    <meta name="twitter:description" content="Una breve descrizione che spinga l'utente a cliccare sul link.">

    <meta name="twitter:image" content="https://www.tuosito.it/immagine.jpg">

    <!-- ALTERNATE - Versioni in altre lingue --> 
    <link rel="alternate" hreflang="it" href="https://www.tuosito.it/pagina">

    <link rel="alternate" hreflang="en" href="https://www.tuosito.it/en/page">

    <link rel="alternate" hreflang="x-default" href="https://www.tuosito.it/en/page">
    
    <!-- CSS Fogli di stile -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gogleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link
        href="htpps://fonts...."
        rel="stylesheet"
    />


</head>

<body>
    <h1>Titolo 1</h1>
</body>
</html>
